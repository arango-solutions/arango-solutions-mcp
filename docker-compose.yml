services:
  arangodb-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ARANGO_HOSTS=http://arangodb:8529
      - ARANGO_ROOT_USERNAME=root
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD:?Set ARANGO_ROOT_PASSWORD before running}
      - ARANGO_DEFAULT_DB_NAME=${ARANGO_DEFAULT_DB_NAME:-_system}
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_JS_TRANSACTIONS=${ENABLE_JS_TRANSACTIONS:-false}
    depends_on:
      arangodb:
        condition: service_healthy
    restart: unless-stopped

  arangodb:
    image: arangodb/arangodb:3.12
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD:?Set ARANGO_ROOT_PASSWORD before running}
    volumes:
      - arangodb-data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  arangodb-data:
