name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Ruff check
        run: poetry run ruff check .

  test:
    name: Test (ArangoDB ${{ matrix.arango-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arango-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Start ArangoDB
        run: |
          docker run -d \
            --name arangodb-test \
            -p 8529:8529 \
            -e ARANGO_ROOT_PASSWORD=test_root_password \
            arangodb/arangodb:${{ matrix.arango-version }}

          echo "Waiting for ArangoDB to become healthy..."
          for i in $(seq 1 90); do
            if curl -sf -u root:test_root_password http://localhost:8529/_api/version > /dev/null 2>&1; then
              echo "ArangoDB is ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ArangoDB failed to start"
              docker logs arangodb-test
              exit 1
            fi
            sleep 2
          done

      - name: Run tests
        env:
          ARANGO_HOSTS: http://localhost:8529
          ARANGO_ROOT_USERNAME: root
          ARANGO_ROOT_PASSWORD: test_root_password
        run: >-
          poetry run pytest tests/ -v
          --ignore=tests/test_cluster.py
          --ignore=tests/test_vector_search.py
          -x

      - name: Cleanup
        if: always()
        run: docker rm -f arangodb-test || true

  test-vector:
    name: Test Vector Search (ArangoDB ${{ matrix.arango-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arango-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Start ArangoDB with vector index support
        run: |
          docker run -d \
            --name arangodb-vector \
            -p 8530:8529 \
            -e ARANGO_ROOT_PASSWORD=test_root_password \
            arangodb/arangodb:${{ matrix.arango-version }} \
            --experimental-vector-index

          echo "Waiting for ArangoDB to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf -u root:test_root_password http://localhost:8530/_api/version > /dev/null 2>&1; then
              echo "ArangoDB is ready (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: Run vector search tests
        env:
          ARANGO_HOSTS: http://localhost:8530
          ARANGO_ROOT_USERNAME: root
          ARANGO_ROOT_PASSWORD: test_root_password
        run: >-
          poetry run pytest tests/test_vector_search.py -v -x

      - name: Cleanup
        if: always()
        run: docker rm -f arangodb-vector || true
